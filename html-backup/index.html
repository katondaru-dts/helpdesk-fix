<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Login — HelpDesk IT v2</title>
    <meta name="description" content="Login ke sistem HelpDesk IT untuk melaporkan dan memantau gangguan.">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="auth-wrap">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="logo-icon"><i class="bi bi-headset"></i></div>
                <h1>HelpDesk IT</h1>
                <p>Sistem Pelaporan Gangguan Terpadu</p>
            </div>

            <div id="alert-box" style="display:none" class="alert"></div>

            <form id="login-form">
                <div class="form-group">
                    <label class="form-label">Email <span class="req">*</span></label>
                    <div class="input-wrap">
                        <i class="bi bi-envelope"></i>
                        <input type="email" id="email" class="form-control" placeholder="email@perusahaan.com" required>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Password <span class="req">*</span></label>
                    <div class="input-wrap">
                        <i class="bi bi-lock"></i>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                        <i class="bi bi-eye-slash" id="toggle-pw"
                            style="position:absolute;right:10px;left:auto;cursor:pointer"></i>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w100 btn-lg" id="btn-login">
                    <i class="bi bi-box-arrow-in-right"></i> Masuk
                </button>
            </form>

            <div class="auth-footer">
                Belum punya akun? <a href="register.html">Daftar sekarang</a>
            </div>

            <!-- Demo credentials -->
            <div
                style="margin-top:20px;padding:14px;background:var(--gray-50);border-radius:var(--radius-sm);border:1px solid var(--gray-200)">
                <p
                    style="font-size:11px;font-weight:600;color:var(--gray-600);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em">
                    Demo Akun</p>
                <div id="demo-list" style="display:flex;flex-direction:column;gap:4px"></div>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script>
        redirectIfLoggedIn();

        const demos = [
            { label: 'Administrator', email: 'admin@helpdesk.id', pass: 'admin123', role: 'Admin' },
            { label: 'IT Support', email: 'budi@helpdesk.id', pass: 'support123', role: 'IT Support' },
            { label: 'User', email: 'katon@helpdesk.id', pass: 'user123', role: 'User' },
        ];
        const demoList = document.getElementById('demo-list');
        demos.forEach(d => {
            const div = document.createElement('div');
            div.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:6px 8px;border-radius:4px;cursor:pointer;transition:.15s';
            div.onmouseenter = () => div.style.background = '#e2e8f0';
            div.onmouseleave = () => div.style.background = '';
            div.innerHTML = `<span style="font-size:12px;color:var(--gray-700)"><b>${d.label}</b> — ${d.email}</span>
  <span style="font-size:10px;background:#DBEAFE;color:#1E40AF;padding:1px 6px;border-radius:10px">${d.role}</span>`;
            div.onclick = () => { document.getElementById('email').value = d.email; document.getElementById('password').value = d.pass; };
            demoList.appendChild(div);
        });

        document.getElementById('toggle-pw').onclick = function () {
            const pw = document.getElementById('password');
            const isText = pw.type === 'text';
            pw.type = isText ? 'password' : 'text';
            this.className = isText ? 'bi bi-eye-slash' : 'bi bi-eye';
            this.style.cssText = 'position:absolute;right:10px;left:auto;cursor:pointer';
        };

        document.getElementById('login-form').onsubmit = function (e) {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Memproses...';
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            setTimeout(() => {
                const res = login(email, password);
                if (res.ok) {
                    const ab = document.getElementById('alert-box');
                    ab.className = 'alert alert-success'; ab.style.display = 'flex';
                    ab.innerHTML = `<i class="bi bi-check-circle-fill"></i> Login berhasil! Mengalihkan...`;
                    setTimeout(() => { window.location.href = (res.user.role_id === 1 || res.user.role_id === 2) ? 'dashboard-admin.html' : 'dashboard-user.html'; }, 800);
                } else {
                    const ab = document.getElementById('alert-box');
                    ab.className = 'alert alert-danger'; ab.style.display = 'flex';
                    ab.innerHTML = `<i class="bi bi-exclamation-circle-fill"></i> ${res.msg}`;
                    btn.disabled = false; btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Masuk';
                }
            }, 400);
        };
    </script>
</body>

</html>
